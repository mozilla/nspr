name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        working-directory: target/pr/tests
        run: ../../../pr/tests/runtests.sh ../../dist

  windows:
    name: windows-latest
    runs-on: windows-latest
    defaults:
      run:
        shell: 'C:\msys64\usr\bin\bash.exe -leo pipefail {0}'
    env:
      MSYSTEM: MINGW64
      CHERE_INVOKING: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 packages
        run: |
          pacman -S --noconfirm --needed \
            base-devel autoconf make python \
            mingw-w64-x86_64-gcc

      - name: Install nsinstall (Firefox's Python port)
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/mozilla/gecko-dev/master/config/nsinstall.py \
            -o /usr/local/bin/nsinstall.py
          # The only `mozfile` use is one Windows read-only-file removal; replace it
          # with a chmod+unlink fallback so we don't need the mozbuild package.
          sed -i \
            -e 's/^import mozfile$//' \
            -e 's/mozfile\.remove(targetpath)/os.chmod(targetpath, 0o666); os.remove(targetpath)/' \
            /usr/local/bin/nsinstall.py
          cat > /usr/local/bin/nsinstall <<'EOF'
          #!/usr/bin/env bash
          exec python3 /usr/local/bin/nsinstall.py "$@"
          EOF
          chmod +x /usr/local/bin/nsinstall

      - name: Configure and build
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(nproc)

      - name: Build tests
        run: |
          export PATH="/mingw64/bin:$PATH"
          make -C target/pr/tests -j$(nproc)

      - name: Run tests
        working-directory: target/pr/tests
        run: |
          export PATH="/mingw64/bin:$PATH"
          ../../../pr/tests/runtests.sh ../../dist
