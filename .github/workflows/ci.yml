name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        run: ./pr/tests/runtests.sh target/dist

  windows:
    name: windows-latest
    runs-on: windows-latest
    defaults:
      run:
        shell: 'C:\msys64\usr\bin\bash.exe -leo pipefail {0}'
    env:
      MSYSTEM: MINGW64
      CHERE_INVOKING: 1
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(nproc)

      - name: Build tests
        run: make -C target/pr/tests -j$(nproc)

      - name: Run tests
        run: ./pr/tests/runtests.sh target/dist
