name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        run: ./pr/tests/runtests.sh target/dist

  windows:
    name: windows-latest
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            autoconf
            make
            mingw-w64-x86_64-gcc

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(nproc)

      - name: Build tests
        run: make -C target/pr/tests -j$(nproc)

      - name: Run tests
        run: ./pr/tests/runtests.sh target/dist
