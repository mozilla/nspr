name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        working-directory: target/pr/tests
        run: ../../../pr/tests/runtests.sh ../../dist

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MozillaBuild
        shell: pwsh
        run: |
          $url = 'https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe'
          Invoke-WebRequest -Uri $url -OutFile mb.exe
          Start-Process -FilePath .\mb.exe -ArgumentList '/S' -Wait

      - name: Build and test
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VSPATH=%%i
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"
          set MOZILLABUILD=C:\mozilla-build\
          C:\mozilla-build\msys2\msys2_shell.cmd -no-start -defterm -full-path -c "set -e; cd '%CD%' && mkdir target && cd target && ../configure --enable-64bit --enable-win32-target=WIN95 --prefix=$PWD/dist && make -j$NUMBER_OF_PROCESSORS && make -C pr/tests -j$NUMBER_OF_PROCESSORS && cd pr/tests && ../../../pr/tests/runtests.sh ../../dist"
