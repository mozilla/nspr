name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}${{ matrix.cc && format(' ({0})', matrix.cc) || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        env:
          CC: ${{ matrix.cc }}
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        working-directory: target/pr/tests
        run: ../../../pr/tests/runtests.sh ../../dist

  warnings-as-errors:
    name: ubuntu-latest (clang, -Wall -Werror)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        env:
          CC: clang
          CFLAGS: "-Wall -Werror -Qunused-arguments"
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting (fails if not formatted)
        run: |
          files=$(find pr lib -type f \( -name '*.c' -o -name '*.h' \))
          clang-format --dry-run $files

  coverage:
    name: ubuntu-latest (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure and build with coverage
        env:
          CFLAGS: "-O0 -g --coverage -fprofile-update=atomic"
          CXXFLAGS: "-O0 -g --coverage -fprofile-update=atomic"
          LDFLAGS: "--coverage"
        run: |
          mkdir target
          cd target
          ../configure --enable-64bit --enable-debug --prefix=$PWD/dist
          make -j$(getconf _NPROCESSORS_ONLN)

      - name: Build tests
        env:
          CFLAGS: "-O0 -g --coverage -fprofile-update=atomic"
          CXXFLAGS: "-O0 -g --coverage -fprofile-update=atomic"
          LDFLAGS: "--coverage"
        run: make -C target/pr/tests -j$(getconf _NPROCESSORS_ONLN) XCFLAGS=--coverage

      - name: Run tests
        working-directory: target/pr/tests
        run: ../../../pr/tests/runtests.sh ../../dist

      - name: Capture coverage
        run: |
          lcov --directory target --capture --output-file coverage.info \
               --ignore-errors mismatch,negative,unused,gcov,source
          lcov --remove coverage.info '/usr/*' '*/pr/tests/*' --output-file coverage.info \
               --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MozillaBuild
        shell: pwsh
        run: |
          $url = 'https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe'
          Invoke-WebRequest -Uri $url -OutFile mb.exe
          Start-Process -FilePath .\mb.exe -ArgumentList '/S' -Wait

      - name: Write build script
        shell: bash
        run: |
          cat > build.sh <<'EOF'
          set -e
          export PATH="$(cygpath -u "$VCToolsInstallDir")bin/Hostx64/x64:$PATH"
          mkdir target
          cd target
          ../configure --enable-64bit --enable-win32-target=WIN95 --prefix=$PWD/dist
          make -j$NUMBER_OF_PROCESSORS
          make -C pr/tests -j$NUMBER_OF_PROCESSORS
          cd pr/tests
          ../../../pr/tests/runtests.sh ../../dist
          EOF

      - name: Build and test
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VSPATH=%%i
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"
          set MOZILLABUILD=C:\mozilla-build\
          C:\mozilla-build\msys2\msys2_shell.cmd -no-start -defterm -full-path -here -c "bash build.sh"
