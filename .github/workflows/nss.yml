name: NSS build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-nss:
    name: Build NSS against NSPR main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NSPR
        uses: actions/checkout@v4
        with:
          path: nspr

      - name: Checkout NSS
        uses: actions/checkout@v4
        with:
          repository: nss-dev/nss
          path: nss

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial gyp ninja-build zlib1g-dev

      - name: Build NSS with sibling NSPR
        working-directory: nss
        run: ./build.sh -v --disable-tests
